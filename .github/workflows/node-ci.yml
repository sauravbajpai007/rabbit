# =============================================================================
# Node.js CI/CD — lint, test, build, and CodeRabbit configuration validation
# =============================================================================
# Triggers:
#   - push to the default release branch (main)
#   - all pull requests (fork-safe defaults; see checkout persist-credentials)
#
# Security / performance notes:
#   - Top-level permissions are minimal; elevate only where a job needs it.
#   - Checkout uses persist-credentials: false (recommended for PRs from forks).
#   - Concurrency cancels superseded runs on the same PR/branch to save minutes.
#   - Pin action major versions; for maximum supply-chain control, pin full SHAs.
#   - Timeouts prevent hung runners from burning quota indefinitely.
# =============================================================================

name: Node.js CI

on:
  # Production deployments usually track `main`; adjust if you use `master` or trunk.
  push:
    branches:
      - main
  # Run on every PR (any base branch). Restrict with `branches: [main]` if required.
  pull_request:

# Default token scope for all jobs — least privilege.
permissions:
  contents: read

# Cancel older workflow runs when new commits land on the same PR or branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Primary CI: install (frozen lockfile), lint, test, build
  # ---------------------------------------------------------------------------
  # Fails the workflow (and should block merge with branch protection) if any
  # step exits non-zero. Keep scripts fast; split slow integration tests later.
  # ---------------------------------------------------------------------------
  ci:
    name: Lint, test & build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      # Many tools (React, Jest, etc.) switch to non-interactive / stricter CI behavior.
      CI: true
      # Optional: raise Node heap for very large TS/Webpack builds (uncomment if needed).
      # NODE_OPTIONS: --max_old_space_size=6144

    steps:
      # --- Source code -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Safer for workflows triggered by pull_request (especially from forks).
          persist-credentials: false

      # --- Node.js + npm cache ----------------------------------------------
      # Caches ~/.npm based on lockfile hash; requires package-lock.json committed.
      - name: Setup Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          # Uncomment if lockfile lives outside the repo root:
          # cache-dependency-path: subfolder/package-lock.json

      # --- Dependencies (reproducible install) ------------------------------
      - name: Install dependencies (npm ci)
        run: npm ci

      # --- Static analysis ---------------------------------------------------
      - name: Run ESLint
        run: npm run lint

      # --- Unit / integration tests ----------------------------------------
      # --ci: disables watch mode, maxWorkers defaults suit CI; add --coverage if desired.
      # Jest 28+: add `--reporters=default --reporters=github-actions` for PR annotations.
      - name: Run Jest
        run: npm test -- --ci

      # --- Production build --------------------------------------------------
      - name: Build application
        run: npm run build

  # ---------------------------------------------------------------------------
  # CodeRabbit — separate job (does not duplicate lint/test/build)
  # ---------------------------------------------------------------------------
  # AI PR reviews are delivered by the CodeRabbit GitHub App once installed on
  # the org/repo (https://github.com/apps/coderabbit/). This job validates that
  # `.coderabbit.yaml` is present and parses, and enables `reviews.tools.github-checks`
  # in that file so reviews can incorporate this workflow’s check results.
  #
  # This job runs in parallel with `ci` so YAML issues fail fast without waiting
  # for the full pipeline; CodeRabbit’s app still correlates with checks when they finish.
  # ---------------------------------------------------------------------------
  coderabbit:
    name: CodeRabbit (config & PR review integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Ensure CodeRabbit configuration exists
        run: |
          test -f .coderabbit.yaml || {
            echo 'Missing .coderabbit.yaml in repository root.' >&2
            exit 1
          }

      - name: Validate .coderabbit.yaml syntax (YAML parse)
        # Ruby and psych are available on ubuntu-latest; fails on invalid YAML.
        run: ruby -ryaml -e "YAML.load_file('.coderabbit.yaml')"

      - name: Log CodeRabbit setup reminder
        run: |
          echo "CodeRabbit AI reviews: install the GitHub App if not already enabled,"
          echo "then open a PR — reviews use branch .coderabbit.yaml and can read GitHub Checks from this workflow."
